<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Cuku Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Outfit', sans-serif; }
        
        /* Navigation */
        nav { padding: 20px; background: #111; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #333; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        nav a:hover { color: #e67e22; }

        .container { max-width: 900px; margin: 60px auto; padding: 20px; text-align: center; }
        h1 { font-size: 3rem; color: #e67e22; margin-bottom: 10px; }
        p { opacity: 0.7; margin-bottom: 40px; }

        /* Contact Cards */
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .info-card { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #222; }
        .info-card h3 { color: #e67e22; margin-bottom: 10px; }
        .info-card a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }

        /* Map */
        .map-box { width: 100%; height: 400px; border-radius: 25px; overflow: hidden; border: 2px solid #333; margin-top: 30px; }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(0.9); }

        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" style="color: #e67e22;">Contact</a>
    </nav>

    <div class="container">
        <h1>SAY HELLO</h1>
        <p>Humein milne Ranchi ke sabse aesthetic cafe mein aaiye.</p>

        <div class="contact-grid">
            <div class="info-card">
                <h3>Call Us</h3>
                <a href="tel:9341344821">9341344821</a>
            </div>
            <div class="info-card">
                <h3>Visit Us</h3>
                <p>Peace Road, Lalpur, Ranchi</p>
            </div>
        </div>

        <a href="https://www.instagram.com/your__ri0" target="_blank" class="insta-btn">Follow us on Instagram</a>

        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3662.308253685458!2d85.3346!3d23.3746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDIyJzI4LjYiTiA4NcKwMjAnMDQuNiJF!5e0!3m2!1sen!2sin!4v1710000000000" allowfullscreen="" loading="lazy"></iframe>
        </div>

        © 2026 Mikey Metrics Agency
    </footer>

</body>
</html>
